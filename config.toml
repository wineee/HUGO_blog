    name = "Search"
    url = "/search/"
    weight = 3
  [[menu.main]]
    name = "Tags"
    url = "/tags/"
    weight = 4
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 5
  [[menu.main]]
    name = "Friends"
    url = "/friends/"
    weight = 6
  [[menu.main]]
    name = "RSS"
    url = "/index.xml"
    weight = 7

